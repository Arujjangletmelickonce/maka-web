name: run-maka-every-3h

on:
  schedule:
    # KST 월~금 11:30, 14:30, 17:30, 20:30
    - cron: "30 2,5,8,11 * * 1-5"

    # KST 월~금 23:30 / 화~토 02:30, 05:30, 08:30
    - cron: "30 14,17,20,23 * * 1-5"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (main)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Debug
        run: |
          pwd
          ls -la
          echo "BRANCH=$(git branch --show-current || true)"
          echo "HEAD=$(git rev-parse HEAD || true)"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run generator
        env:
          OPENAI_KEY: ${{ secrets.OPENAI_KEY }}
          POLYGON_KEY: ${{ secrets.POLYGON_KEY }}
        run: |
          python maka_pro_story.py

      - name: Commit & push updated web data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p web/data
          git add web/data

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "auto: update web data"
          git push origin HEAD:main
