name: run-maka-every-3h

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (main)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Debug repo files
        run: |
          pwd
          ls -la
          git branch --show-current || true
          git rev-parse HEAD || true

      - name: Ensure requirements.txt
        run: |
          if [ -f requirements.txt ]; then
            echo "requirements.txt exists"
          else
            echo "requirements.txt missing -> create it"
            cat > requirements.txt << 'REQ'
requests
matplotlib
numpy
openai
yfinance
pandas
REQ
          fi
          echo "=== requirements.txt ==="
          cat requirements.txt

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run generator
        env:
          OPENAI_KEY: ${{ secrets.OPENAI_KEY }}
          POLYGON_KEY: ${{ secrets.POLYGON_KEY }}
        run: |
          python maka_pro_story.py

      - name: Commit & push updated web data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/data
          git commit -m "auto: update web data" || echo "No changes"
          git push
