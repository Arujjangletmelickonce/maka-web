name: run-maka-every-3h

on:
  schedule:
    - cron: "0 */3 * * *"   # 3시간마다(UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (force main)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Debug files
        run: |
          echo "=== PWD ==="
          pwd
          echo "=== LS (root) ==="
          ls -la
          echo "=== Git branch / HEAD ==="
          git branch --show-current || true
          git rev-parse HEAD || true
          echo "=== requirements ==="
          ls -la requirements.txt || true
          echo "=== web ==="
          ls -la web || true

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          elif [ -f web/requirements.txt ]; then
            python -m pip install -r web/requirements.txt
          else
            echo "requirements.txt not found"
            ls -la
            ls -la web || true
            exit 1
          fi

      - name: Run generator
        env:
          OPENAI_KEY: ${{ secrets.OPENAI_KEY }}
          POLYGON_KEY: ${{ secrets.POLYGON_KEY }}
        run: |
          python maka_pro_story.py

      - name: Commit & push updated web data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/data
          git commit -m "auto: update web data" || echo "No changes"
          git push