<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>QQQ Maka</title>
  <style>
    body{
      font-family:system-ui,-apple-system,"Apple SD Gothic Neo",sans-serif;
      max-width:980px;
      margin:24px auto;
      padding:0 14px;
      line-height:1.65;
      background:#fff;
      color:#111;
    }
    header{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      margin-bottom:12px;
      gap:12px;
    }
    nav a{
      margin-left:10px;
      text-decoration:none;
      color:#333;
    }
    nav a.active{
      font-weight:700;
    }
    .support-top{
      display:flex;
      flex-direction:column;
      align-items:flex-end;
      gap:8px;
    }
    .support-btn{
      border:1px solid #ddd;
      background:#fff;
      border-radius:999px;
      padding:8px 14px;
      font-size:13px;
      cursor:pointer;
      white-space:nowrap;
    }
    .support-btn:hover{
      background:#fafafa;
    }
    .support-note{
      font-size:12px;
      color:#666;
      display:none;
      margin-top:6px;
    }
    .support-note.show{
      display:block;
    }
    .footer-support{
      margin:40px 0 24px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:8px;
    }
    .footer-support .support-note{
      text-align:center;
    }
    .meta{
      color:#666;
      font-size:14px;
      margin:0 0 14px;
    }
    img{
      max-width:100%;
      border-radius:12px;
      border:1px solid #eee;
      display:block;
      margin:0 0 12px;
    }
    .card{
      border:1px solid #eee;
      border-radius:14px;
      padding:14px;
      margin:12px 0;
      background:#fff;
    }
    .list{
      display:flex;
      flex-direction:column;
      gap:8px;
    }
    .list-scroll{
      max-height:52vh;
      overflow:auto;
      padding-right:4px;
    }
    .item{
      padding:10px 12px;
      border:1px solid #eee;
      border-radius:12px;
      cursor:pointer;
      background:#fff;
      transition:background .12s ease,border-color .12s ease;
    }
    .item:hover{
      background:#fafafa;
    }
    .item.active{
      border-color:#222;
      background:#f7f7f7;
    }
    .item-top{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
    }
    .item-main{
      flex:1;
      min-width:0;
    }
    .item-title{
      font-weight:700;
    }
    .item-sub{
      color:#666;
      font-size:12px;
      margin-top:4px;
      word-break:break-all;
    }
    .check-wrap{
      display:flex;
      align-items:center;
      gap:6px;
      flex-shrink:0;
      font-size:12px;
      color:#555;
      user-select:none;
    }
    .check-wrap input{
      width:16px;
      height:16px;
      cursor:pointer;
    }
    pre{
      white-space:pre-wrap;
      word-break:break-word;
    }
    .grid{
      display:grid;
      grid-template-columns:320px 1fr;
      gap:12px;
      align-items:start;
    }
    .label{
      font-size:13px;
      color:#666;
      margin-bottom:6px;
    }
    .select{
      width:100%;
      padding:10px 12px;
      border:1px solid #ddd;
      border-radius:10px;
      font-size:14px;
      background:#fff;
      color:#111;
    }
    .archive-top{
      display:grid;
      grid-template-columns:1fr;
      gap:10px;
      margin-bottom:10px;
    }
    .small{
      color:#666;
      font-size:13px;
    }
    .empty{
      color:#666;
      font-size:14px;
      padding:8px 2px;
    }
    .admin-top{
      margin-top:12px;
      padding-top:12px;
      border-top:1px solid #eee;
    }
    .candidate-box{
      margin-top:12px;
      padding-top:12px;
      border-top:1px solid #eee;
    }
    .candidate-actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:8px;
    }
    .btn{
      border:1px solid #ddd;
      background:#fff;
      border-radius:10px;
      padding:9px 12px;
      font-size:13px;
      cursor:pointer;
    }
    .btn:hover{
      background:#fafafa;
    }
    .btn.primary{
      border-color:#222;
    }
    textarea{
      width:100%;
      min-height:120px;
      border:1px solid #ddd;
      border-radius:10px;
      padding:10px 12px;
      font-size:13px;
      resize:vertical;
      box-sizing:border-box;
    }
    .pill{
      display:inline-block;
      padding:3px 8px;
      border:1px solid #e5e5e5;
      border-radius:999px;
      font-size:12px;
      color:#444;
      margin-left:6px;
    }
    .hidden{
      display:none;
    }
    .candidate-list{
      display:flex;
      flex-direction:column;
      gap:8px;
      margin-top:10px;
    }
    .candidate-item{
      border:1px solid #eee;
      border-radius:12px;
      padding:10px 12px;
      background:#fff;
    }
    .candidate-item-title{
      font-size:14px;
      font-weight:700;
    }
    .candidate-item-sub{
      color:#666;
      font-size:12px;
      margin-top:4px;
      word-break:break-all;
    }
    .candidate-empty{
      color:#666;
      font-size:13px;
      margin-top:10px;
    }
    .detail-placeholder{
      margin-top:0;
    }
    @media (max-width:900px){
      .grid{
        grid-template-columns:1fr;
      }
      .list-scroll{
        max-height:40vh;
      }
      .support-top{
        align-items:flex-end;
      }
    }
  </style>
</head>
<body>
  <header>
    <div style="font-size:20px;font-weight:800;">QQQ Maka</div>

    <div class="support-top">
      <nav>
        <a href="#latest" id="tab-latest" class="active">최신</a>
        <a href="#archive" id="tab-archive">아카이브</a>
      </nav>

      <div>
        <button class="support-btn" id="support-btn-top" type="button">☕ 커피 한 잔 사주기</button>
        <div class="support-note" id="support-note-top">현재는 마음만 받고 있습니다 껄껄껄 (&gt;ㅅ&lt;)</div>
      </div>
    </div>
  </header>

  <div id="view"></div>

  <div class="footer-support">
    <button class="support-btn" id="support-btn-bottom" type="button">☕ 커피 한 잔 사주기</button>
    <div class="support-note" id="support-note-bottom">현재는 마음만 받고 있습니다 껄껄껄 (&gt;ㅅ&lt;)</div>
  </div>

<script>
const view = document.getElementById("view");
const tabLatest = document.getElementById("tab-latest");
const tabArchive = document.getElementById("tab-archive");

const supportBtnTop = document.getElementById("support-btn-top");
const supportNoteTop = document.getElementById("support-note-top");
const supportBtnBottom = document.getElementById("support-btn-bottom");
const supportNoteBottom = document.getElementById("support-note-bottom");

let renderToken = 0;

const WEEKDAY_KR = ["일", "월", "화", "수", "목", "금", "토"];
const FILTER_WEEKDAYS = ["월", "화", "수", "목", "금", "토"];
const DELETE_STORAGE_KEY = "maka_delete_candidates_v2";
const ADMIN_VISIBLE_KEY = "maka_admin_visible_v1";

function normalizeHash(){
  const h = (location.hash || "").toLowerCase();
  if (h.startsWith("#archive")) return "#archive";
  return "#latest";
}

function setActive(hash){
  tabLatest.classList.toggle("active", hash === "#latest");
  tabArchive.classList.toggle("active", hash === "#archive");
}

function toggleSupportNote(noteEl){
  if(!noteEl) return;
  noteEl.classList.toggle("show");
}

async function fetchJson(url){
  const r = await fetch(url, { cache: "no-store" });
  if(!r.ok) throw new Error("fetch failed: " + url);
  return await r.json();
}

async function fetchText(url){
  const r = await fetch(url, { cache: "no-store" });
  if(!r.ok) throw new Error("fetch failed: " + url);
  return await r.text();
}

function mdToHtml(md){
  const esc = (s)=>s.replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;");
  const lines = md.split("\n");
  let html = "";
  let inList = false;

  for(const raw of lines){
    const line = raw.trimEnd();

    if(line.trim() === ""){
      if(inList){
        html += "</ul>";
        inList = false;
      }
      html += "<div style='height:10px'></div>";
      continue;
    }

    if(line.startsWith("---") || line.startsWith("------")){
      if(inList){
        html += "</ul>";
        inList = false;
      }
      html += "<hr/>";
      continue;
    }

    if(line.startsWith("- ")){
      if(!inList){
        html += "<ul>";
        inList = true;
      }
      html += `<li>${esc(line.slice(2))}</li>`;
      continue;
    }

    if(inList){
      html += "</ul>";
      inList = false;
    }

    html += `<p>${esc(line)}</p>`;
  }

  if(inList) html += "</ul>";
  return html;
}

function parseTimeKst(timeStr){
  if(!timeStr) return null;
  const normalized = timeStr.replace(" ", "T");
  const dt = new Date(normalized);
  if(isNaN(dt.getTime())) return null;
  return dt;
}

function getWeekNo(day){
  if(day >= 1 && day <= 7) return 1;
  if(day >= 8 && day <= 14) return 2;
  if(day >= 15 && day <= 21) return 3;
  if(day >= 22 && day <= 28) return 4;
  return 5;
}

function getWeekLabelFromTime(timeStr){
  const dt = parseTimeKst(timeStr);
  if(!dt) return "기타";

  const year = dt.getFullYear();
  const month = dt.getMonth() + 1;
  const day = dt.getDate();
  const weekNo = getWeekNo(day);

  return `${year}년 ${month}월 ${weekNo}주차`;
}

function getWeekdayKrFromTime(timeStr){
  const dt = parseTimeKst(timeStr);
  if(!dt) return "기타";
  return WEEKDAY_KR[dt.getDay()] || "기타";
}

function makePostLabel(it){
  const dt = parseTimeKst(it.time_kst || "");
  let mmddhhmm = it.time_kst || "";

  if(dt){
    const mm = String(dt.getMonth() + 1).padStart(2, "0");
    const dd = String(dt.getDate()).padStart(2, "0");
    const hh = String(dt.getHours()).padStart(2, "0");
    const mi = String(dt.getMinutes()).padStart(2, "0");
    mmddhhmm = `${mm}-${dd} ${hh}:${mi}`;
  }

  let spotText = "-";
  if(it.spot !== undefined && it.spot !== null && it.spot !== ""){
    const n = Number(it.spot);
    spotText = Number.isFinite(n) ? n.toFixed(2) : String(it.spot);
  }

  const mode = it.content_mode_kst || it.mode || "";
  return mode
    ? `${mmddhhmm} / QQQ ${spotText} / ${mode}`
    : `${mmddhhmm} / QQQ ${spotText}`;
}

function groupItemsByWeek(items){
  const grouped = {};

  for(const it of items){
    const weekKey = getWeekLabelFromTime(it.time_kst || "");
    if(!grouped[weekKey]) grouped[weekKey] = [];
    grouped[weekKey].push(it);
  }

  const weekKeys = Object.keys(grouped).sort((a, b) => {
    const aTime = grouped[a]?.[0]?.time_kst || "";
    const bTime = grouped[b]?.[0]?.time_kst || "";
    return bTime.localeCompare(aTime);
  });

  for(const key of weekKeys){
    grouped[key].sort((a, b) => (b.time_kst || "").localeCompare(a.time_kst || ""));
  }

  return { grouped, weekKeys };
}

function groupWeekItemsByWeekday(weekItems){
  const byDay = {};
  for(const day of FILTER_WEEKDAYS){
    byDay[day] = [];
  }

  for(const it of weekItems){
    const dayKr = getWeekdayKrFromTime(it.time_kst || "");
    if(byDay[dayKr]){
      byDay[dayKr].push(it);
    }
  }

  for(const day of FILTER_WEEKDAYS){
    byDay[day].sort((a, b) => (b.time_kst || "").localeCompare(a.time_kst || ""));
  }

  return byDay;
}

function findDefaultWeekday(byDay){
  for(const day of FILTER_WEEKDAYS){
    if((byDay[day] || []).length > 0){
      return day;
    }
  }
  return FILTER_WEEKDAYS[0];
}

function loadDeleteCandidates(){
  try{
    const raw = localStorage.getItem(DELETE_STORAGE_KEY);
    if(!raw) return [];
    const arr = JSON.parse(raw);
    if(!Array.isArray(arr)) return [];
    return arr.filter(x => x && typeof x.run_id === "string");
  }catch{
    return [];
  }
}

function saveDeleteCandidates(arr){
  localStorage.setItem(DELETE_STORAGE_KEY, JSON.stringify(arr));
}

function hasDeleteCandidate(runId){
  return loadDeleteCandidates().some(x => x.run_id === runId);
}

function addDeleteCandidate(item){
  const arr = loadDeleteCandidates();
  if(!arr.some(x => x.run_id === item.run_id)){
    arr.push({
      run_id: item.run_id,
      label: makePostLabel(item)
    });
    saveDeleteCandidates(arr);
  }
}

function removeDeleteCandidate(runId){
  const arr = loadDeleteCandidates().filter(x => x.run_id !== runId);
  saveDeleteCandidates(arr);
}

function clearDeleteCandidates(){
  saveDeleteCandidates([]);
}

function getDeleteCandidatesText(){
  return loadDeleteCandidates().map(x => x.run_id).join("\n");
}

function isAdminVisible(){
  return localStorage.getItem(ADMIN_VISIBLE_KEY) === "1";
}

function setAdminVisible(v){
  localStorage.setItem(ADMIN_VISIBLE_KEY, v ? "1" : "0");
}

function renderCandidatePanel(){
  const countEl = document.getElementById("candidate-count");
  const textEl = document.getElementById("candidate-text");
  const listEl = document.getElementById("candidate-list");
  const toggleBtn = document.getElementById("admin-toggle-btn");
  const adminPanel = document.getElementById("admin-panel");

  const arr = loadDeleteCandidates();

  if(countEl) countEl.textContent = `${arr.length}개 선택됨`;
  if(textEl) textEl.value = arr.map(x => x.run_id).join("\n");

  if(listEl){
    listEl.innerHTML = "";
    if(arr.length === 0){
      listEl.innerHTML = `<div class="candidate-empty">선택된 삭제 후보가 없습니다.</div>`;
    }else{
      arr.forEach((it) => {
        const div = document.createElement("div");
        div.className = "candidate-item";
        div.innerHTML = `
          <div class="candidate-item-title">${it.label || it.run_id}</div>
          <div class="candidate-item-sub">run_id: ${it.run_id}</div>
        `;
        listEl.appendChild(div);
      });
    }
  }

  const visible = isAdminVisible();

  if(toggleBtn){
    toggleBtn.textContent = visible ? "관리 기능 숨기기" : "관리 기능 보기";
  }

  if(adminPanel){
    adminPanel.classList.toggle("hidden", !visible);
  }
}

async function copyCandidates(){
  const text = getDeleteCandidatesText();
  if(!text){
    alert("삭제 후보가 비어 있습니다.");
    return;
  }

  try{
    await navigator.clipboard.writeText(text);
    alert("run_id 목록을 복사했습니다.");
  }catch{
    alert("복사에 실패했습니다. 아래 텍스트를 직접 복사해 주세요.");
  }
}

async function renderRunInto(runId, targetEl, token){
  const base = `data/posts/${runId}/`;
  const meta = await fetchJson(base + "meta.json");
  if(token !== renderToken) return;

  const post = await fetchText(base + "post.md");
  if(token !== renderToken) return;

  const files = meta.files || {};
  const chart = files.maka_chart ? (base + files.maka_chart) : null;
  const qqq = files.qqq_price ? (base + files.qqq_price) : null;

  targetEl.innerHTML = `
    <div class="meta">KST ${meta.time_kst || ""} · Spot ${meta.spot ?? ""} (${meta.spot_source || ""})</div>
    ${chart ? `<img src="${chart}" alt="maka_chart"/>` : ""}
    ${qqq ? `<img src="${qqq}" alt="qqq_price"/>` : ""}
    <div>${mdToHtml(post)}</div>
  `;
}

async function renderLatest(){
  const token = ++renderToken;
  setActive("#latest");
  view.innerHTML = "<div class='card'>불러오는 중...</div>";

  const latest = await fetchJson("data/latest.json");
  if(token !== renderToken) return;

  await renderRunInto(latest.latest_run_id, view, token);
}

async function renderArchive(){
  const token = ++renderToken;
  setActive("#archive");

  view.innerHTML = "<div class='card'>불러오는 중...</div>";
  const idx = await fetchJson("data/index.json");
  if(token !== renderToken) return;

  const items = idx.items || [];

  if(items.length === 0){
    view.innerHTML = "<div class='card'>아카이브가 비어 있습니다.</div>";
    return;
  }

  const { grouped, weekKeys } = groupItemsByWeek(items);
  const firstWeek = weekKeys[0];

  view.innerHTML = `
    <div class="grid">
      <div>
        <div class="card">
          <div style="font-weight:800;margin-bottom:10px;">아카이브</div>

          <div class="archive-top">
            <div>
              <div class="label">주차 선택</div>
              <select id="week-select" class="select"></select>
            </div>

            <div>
              <div class="label">요일 선택</div>
              <select id="day-select" class="select"></select>
            </div>
          </div>

          <div id="week-info" class="small" style="margin-bottom:10px;"></div>
          <div class="list list-scroll" id="list"></div>

          <div class="admin-top">
            <button class="btn primary" id="admin-toggle-btn" type="button">관리 기능 보기</button>
          </div>

          <div class="candidate-box hidden" id="admin-panel">
            <div style="font-weight:800;">
              삭제 후보
              <span class="pill" id="candidate-count">0개 선택됨</span>
            </div>

            <div id="candidate-list" class="candidate-list"></div>

            <div style="margin-top:10px;">
              <textarea id="candidate-text" readonly></textarea>
            </div>

            <div class="candidate-actions">
              <button class="btn" id="copy-btn" type="button">run_id 복사</button>
              <button class="btn" id="clear-btn" type="button">전체 비우기</button>
            </div>
          </div>
        </div>
      </div>

      <div id="detail">
        <div class="card detail-placeholder">왼쪽에서 항목을 선택하세요.</div>
      </div>
    </div>
  `;

  const weekSelect = document.getElementById("week-select");
  const daySelect = document.getElementById("day-select");
  const weekInfo = document.getElementById("week-info");
  const list = document.getElementById("list");
  const detail = document.getElementById("detail");
  const copyBtn = document.getElementById("copy-btn");
  const clearBtn = document.getElementById("clear-btn");
  const adminToggleBtn = document.getElementById("admin-toggle-btn");

  copyBtn.onclick = async () => {
    await copyCandidates();
  };

  clearBtn.onclick = () => {
    const ok = confirm("삭제 후보 목록을 전부 비울까요?");
    if(!ok) return;
    clearDeleteCandidates();
    renderCandidatePanel();
    drawList(weekSelect.value, daySelect.value);
  };

  adminToggleBtn.onclick = () => {
    setAdminVisible(!isAdminVisible());
    renderCandidatePanel();
    drawList(weekSelect.value, daySelect.value);
  };

  weekKeys.forEach((weekKey) => {
    const opt = document.createElement("option");
    opt.value = weekKey;
    opt.textContent = weekKey;
    weekSelect.appendChild(opt);
  });

  function drawList(weekKey, dayKey){
    const weekItems = grouped[weekKey] || [];
    const byDay = groupWeekItemsByWeekday(weekItems);
    const dayItems = byDay[dayKey] || [];
    const adminVisible = isAdminVisible();

    const totalInWeek = weekItems.length;
    const totalInDay = dayItems.length;

    weekInfo.textContent = `${weekKey} · ${dayKey}요일 게시글 ${totalInDay}개 / 주간 전체 ${totalInWeek}개`;
    list.innerHTML = "";
    detail.innerHTML = "<div class='card detail-placeholder'>왼쪽에서 항목을 선택하세요.</div>";

    if(dayItems.length === 0){
      list.innerHTML = `<div class="empty">${dayKey}요일 게시글이 없습니다.</div>`;
      renderCandidatePanel();
      return;
    }

    dayItems.forEach((it, idx) => {
      const div = document.createElement("div");
      div.className = "item";

      const checked = hasDeleteCandidate(it.run_id) ? "checked" : "";
      const checkHtml = adminVisible ? `
        <label class="check-wrap">
          <input type="checkbox" data-run-id="${it.run_id}" ${checked}/>
          삭제 후보
        </label>
      ` : "";

      div.innerHTML = `
        <div class="item-top">
          <div class="item-main">
            <div class="item-title">${makePostLabel(it)}</div>
            <div class="item-sub">run_id: ${it.run_id}</div>
          </div>
          ${checkHtml}
        </div>
      `;

      div.onclick = async () => {
        document.querySelectorAll(".item").forEach(el => el.classList.remove("active"));
        div.classList.add("active");

        const t2 = renderToken;
        detail.innerHTML = "<div class='card detail-placeholder'>불러오는 중...</div>";
        await renderRunInto(it.run_id, detail, t2);
      };

      if(adminVisible){
        const checkbox = div.querySelector('input[type="checkbox"]');
        if(checkbox){
          checkbox.onclick = (e) => {
            e.stopPropagation();
          };
          checkbox.onchange = () => {
            if(checkbox.checked){
              addDeleteCandidate(it);
            }else{
              removeDeleteCandidate(it.run_id);
            }
            renderCandidatePanel();
          };
        }
      }

      list.appendChild(div);

      if(idx === 0){
        setTimeout(() => div.click(), 0);
      }
    });

    renderCandidatePanel();
  }

  function refreshDayOptionsForWeek(weekKey){
    const weekItems = grouped[weekKey] || [];
    const byDay = groupWeekItemsByWeekday(weekItems);
    const defaultDay = findDefaultWeekday(byDay);

    daySelect.innerHTML = "";
    FILTER_WEEKDAYS.forEach((day) => {
      const count = (byDay[day] || []).length;
      const opt = document.createElement("option");
      opt.value = day;
      opt.textContent = `${day}요일 (${count})`;
      daySelect.appendChild(opt);
    });

    daySelect.value = defaultDay;
    drawList(weekKey, defaultDay);
  }

  weekSelect.value = firstWeek;
  refreshDayOptionsForWeek(firstWeek);

  weekSelect.onchange = () => {
    refreshDayOptionsForWeek(weekSelect.value);
  };

  daySelect.onchange = () => {
    drawList(weekSelect.value, daySelect.value);
  };

  renderCandidatePanel();
}

async function router(){
  const hash = normalizeHash();
  try{
    if(hash === "#archive") await renderArchive();
    else await renderLatest();
  }catch(e){
    view.innerHTML = `<div class="card"><b>에러</b><pre>${e}</pre></div>`;
  }
}

window.addEventListener("hashchange", router);

if (!location.hash) location.hash = "#latest";
router();

if (supportBtnTop) {
  supportBtnTop.onclick = () => {
    toggleSupportNote(supportNoteTop);
  };
}

if (supportBtnBottom) {
  supportBtnBottom.onclick = () => {
    toggleSupportNote(supportNoteBottom);
  };
}
</script>
</body>
